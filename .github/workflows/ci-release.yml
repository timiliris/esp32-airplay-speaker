name: CI & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find main components -path components/u8g2 -prune -o \( -name "*.c" -o -name "*.h" \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Build and generate compile_commands.json
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: esp32s3
          command: idf.py -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.esp32s3" build

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Run clang-tidy
        run: |
          COMPILE_DB="build"
          WARNINGS=0
          while IFS= read -r -d '' file; do
            echo "Checking $file..."
            OUTPUT=$(clang-tidy -p "$COMPILE_DB" "$file" 2>&1 || true)
            FILTERED=$(echo "$OUTPUT" | grep -v "file not found \[clang-diagnostic" || true)
            if echo "$FILTERED" | grep -q ": warning:"; then
              echo "$FILTERED" | grep -E "(: warning:|: note:)"
              WARNINGS=1
            fi
          done < <(find main components -path components/u8g2 -prune -o \( -name "*.c" -o -name "*.h" \) -print0)
          if [ "$WARNINGS" -ne 0 ]; then
            echo ""
            echo "clang-tidy found issues"
            exit 1
          fi
          echo "All files pass clang-tidy checks"

  build:
    runs-on: ubuntu-latest
    needs: [format-check, lint-check]
    strategy:
      fail-fast: false
      matrix:
        # `name` -> asset suffix; `env` -> what the desktop app calls the board;
        # `target` -> esp chip; `flash_size`/`label` feed the manifest the app reads.
        include:
          - name: esp32s3
            env: esp32s3
            target: esp32s3
            flash_size: "16MB"
            label: "ESP32-S3 DevKitC-1 (16 Mo)"
            sdkconfig: "sdkconfig.defaults;sdkconfig.defaults.esp32s3"
          - name: xiao-s3
            env: xiao-s3
            target: esp32s3
            flash_size: "8MB"
            label: "Seeed XIAO ESP32-S3 (8 Mo)"
            sdkconfig: "sdkconfig.defaults;sdkconfig.defaults.esp32s3;sdkconfig.defaults.xiao"
          - name: squeezeamp-bt
            env: squeezeamp
            target: esp32
            flash_size: "8MB"
            label: "SqueezeAMP (ESP32, BT, 8 Mo)"
            sdkconfig: "sdkconfig.defaults;sdkconfig.defaults.squeezeamp;sdkconfig.defaults.bt"
          - name: squeezeamp-4m
            env: squeezeamp-4m
            target: esp32
            flash_size: "4MB"
            label: "SqueezeAMP (ESP32, 4 Mo)"
            sdkconfig: "sdkconfig.defaults;sdkconfig.defaults.squeezeamp-4m"
          - name: esparagus-audio-brick-bt
            env: esparagus-audio-brick
            target: esp32
            flash_size: "8MB"
            label: "Esparagus Audio Brick (ESP32, BT)"
            sdkconfig: "sdkconfig.defaults;sdkconfig.defaults.esparagus-audio-brick;sdkconfig.defaults.bt"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      # Build the app, then produce TWO artifacts per board:
      #   firmware-<name>.bin -> app-partition image, for OTA (POST /api/ota/update)
      #   merged-<name>.bin   -> full flash image (esptool merge_bin), for USB serial at 0x0
      - name: Build ${{ matrix.name }}
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5
          target: ${{ matrix.target }}
          command: >
            idf.py -DSDKCONFIG_DEFAULTS="${{ matrix.sdkconfig }}" build &&
            mkdir -p dist &&
            ( cd build && esptool.py --chip ${{ matrix.target }} merge_bin --format raw -o merged.bin $(cat flash_args) ) &&
            cp build/merged.bin dist/merged-${{ matrix.name }}.bin &&
            cp build/airplay2-receiver.bin dist/firmware-${{ matrix.name }}.bin

      - name: Write manifest fragment
        run: |
          mkdir -p dist
          cat > "dist/manifest-${{ matrix.name }}.json" <<EOF
          {
            "env": "${{ matrix.env }}",
            "label": "${{ matrix.label }}",
            "chip": "${{ matrix.target }}",
            "flashSize": "${{ matrix.flash_size }}",
            "app": "firmware-${{ matrix.name }}.bin",
            "merged": "merged-${{ matrix.name }}.bin"
          }
          EOF

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: firmware-${{ matrix.name }}
          path: dist/*

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          pattern: firmware-*
          merge-multiple: true

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          BUMPED=false

          # Check if release with this version already exists
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists, auto-incrementing..."
            LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
            LATEST_VERSION=${LATEST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_VERSION"
            NEW_PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            BUMPED=true
            echo "New version: $VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"

      - name: Assemble manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "{"
            echo "  \"version\": \"${VERSION}\","
            echo "  \"boards\": ["
            FIRST=1
            for f in $(ls dist/manifest-*.json | sort); do
              if [ $FIRST -eq 0 ]; then echo "    ,"; fi
              sed 's/^/    /' "$f"
              FIRST=0
            done
            echo "  ]"
            echo "}"
          } > dist/manifest.json
          rm -f dist/manifest-*.json
          echo "--- manifest.json ---"; cat dist/manifest.json
          echo "--- assets ---"; ls -l dist

      - name: Update version.txt
        if: steps.version.outputs.bumped == 'true'
        run: |
          echo "${{ steps.version.outputs.version }}" > version.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "Bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            dist/*.bin
            dist/manifest.json
          make_latest: true
          generate_release_notes: true
