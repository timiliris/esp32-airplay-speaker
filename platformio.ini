board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.esparagus-audio-brick;sdkconfig.defaults.bt"
    
[env:esparagus-audio-brick-s3]
extends = env:esp32s3
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.cmake_extra_args =
