[platformio]
default_envs = esp32s3
src_dir = main
extra_configs = user_platformio.ini

; Common settings for all environments
[env]
monitor_speed = 115200
monitor_filters = direct
board_build.filesystem = spiffs
build_flags =
    -Wno-maybe-uninitialized
    -Os
    -DCONFIG_SPIRAM_SIZE=8388608

[env:squeezeamp]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = esp-wrover-kit
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = components/boards/partitions.csv
board_upload.flash_size = 8MB
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.squeezeamp"
monitor_rts=0
monitor_dtr=0

[env:squeezeamp-bt]
extends = env:squeezeamp
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.squeezeamp;sdkconfig.defaults.bt"
    
[env:squeezeamp-4m]
extends = env:squeezeamp
board_build.flash_size = 4MB
board_build.partitions = components/boards/partitions-4m.csv
board_upload.flash_size = 4MB
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.squeezeamp-4m"

[env:esp32s3]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = components/boards/partitions.csv
board_upload.flash_size = 16MB
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.esp32s3"

# Seeed XIAO ESP32-S3 (8MB flash, 8MB octal PSRAM). Same firmware as esp32s3,
# but 8MB flash + I2S remapped to the XIAO pads (BCK=GPIO1/D0, LRC=GPIO2/D1,
# DIN=GPIO4/D3; amp SD/enable=GPIO5/D4 via the Protection card). The existing
# partitions.csv already fits exactly 8MB.
[env:xiao-s3]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = seeed_xiao_esp32s3
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = components/boards/partitions.csv
board_upload.flash_size = 8MB
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.esp32s3;sdkconfig.defaults.xiao"

[env:esp32s3-jtag]
extends = env:esp32s3
upload_protocol = esp-builtin

[env:esp32wrover-dev]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = freenove_esp32_wrover
board_build.mcu = esp32
board_build.partitions = components/boards/partitions-4m.csv
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.wrover;sdkconfig.defaults.bt"

[env:esparagus-audio-brick]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = esp-wrover-kit
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = components/boards/partitions.csv
board_upload.flash_size = 8MB
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.esparagus-audio-brick"
monitor_rts=0
monitor_dtr=0

[env:esparagus-audio-brick-bt]
